# Runs lint, tests, and build on every PR and on pushes to master (including merge commits).
name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22.14'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
